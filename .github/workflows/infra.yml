name: Infra

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      TF_DIR: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform apply (infra)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_graylog_root_password_sha2: ${{ secrets.GRAYLOG_ROOT_PASSWORD_SHA2 }}
          TF_VAR_graylog_password_secret: ${{ secrets.GRAYLOG_PASSWORD_SECRET }}
          TF_VAR_graylog_smtp_username: ${{ secrets.GRAYLOG_SMTP_USERNAME }}
          TF_VAR_graylog_smtp_password: ${{ secrets.GRAYLOG_SMTP_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.security \
            -target=module.ecr \
            -target=module.alb \
            -target=module.monitoring