name: Deploy

on:
  workflow_run:
    workflows: [Infra]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      TF_DIR: terraform
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Resolve ECR repo URL
        id: ecr
        working-directory: ${{ env.TF_DIR }}
        run: echo "repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.repo_url }}"

      - name: Build and push image
        run: |
          docker build -t "${{ steps.ecr.outputs.repo_url }}:${IMAGE_TAG}" .
          docker push "${{ steps.ecr.outputs.repo_url }}:${IMAGE_TAG}"

      - name: Terraform apply (deploy)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${IMAGE_TAG}" \
            -target=module.ecs
